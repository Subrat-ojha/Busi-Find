<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Busi Find</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, "Segoe UI", sans-serif;
  background: #f5f5f0;
  color: #1a1a1a;
  line-height: 1.5;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 20px;
}

h1 {
  font-size: 1.4rem;
  font-weight: 600;
  margin-bottom: 24px;
  color: #111;
}

h1 span { color: #666; font-weight: 400; }

/* form */
.search-form {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.search-form input {
  flex: 1;
  min-width: 160px;
  padding: 10px 12px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 0.9rem;
  background: #fff;
  outline: none;
}

.search-form input:focus { border-color: #333; }
.search-form input[type="number"] { max-width: 80px; min-width: 80px; }

.search-form button {
  padding: 10px 20px;
  background: #1a1a1a;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 0.9rem;
  cursor: pointer;
}

.search-form button:hover { background: #333; }
.search-form button:disabled { background: #999; cursor: wait; }

/* progress */
.progress {
  display: none;
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 6px;
  margin-bottom: 24px;
  overflow: hidden;
}

.progress.visible { display: block; }

.progress-header {
  padding: 10px 14px;
  font-size: 0.82rem;
  font-weight: 500;
  color: #333;
  background: #fafaf8;
  border-bottom: 1px solid #eee;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #4caf50;
  animation: pulse 1s infinite;
}

.dot.idle { animation: none; background: #999; }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

.progress-log {
  max-height: 220px;
  overflow-y: auto;
  padding: 4px 0;
  font-family: "SF Mono", "Consolas", "Courier New", monospace;
  font-size: 0.78rem;
  color: #555;
}

.log-line {
  padding: 2px 14px;
  display: flex;
  gap: 10px;
  transition: color 0.15s;
}

.log-line:last-child { color: #111; font-weight: 500; }
.log-line .lbl { color: #aaa; min-width: 50px; flex-shrink: 0; }
.log-line:last-child .lbl { color: #888; }
.log-line .msg { color: inherit; }

/* bar */
.bar-wrap {
  height: 3px;
  background: #eee;
}

.bar {
  height: 100%;
  background: #4caf50;
  width: 0%;
  transition: width 0.3s;
}

/* tabs */
.tabs {
  display: none;
  gap: 0;
  border-bottom: 1px solid #ddd;
}

.tabs.visible { display: flex; }

.tab {
  padding: 8px 16px;
  font-size: 0.85rem;
  cursor: pointer;
  border: none;
  background: none;
  color: #666;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}

.tab:hover { color: #111; }
.tab.active { color: #111; border-bottom-color: #111; font-weight: 500; }

/* results */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
  background: #fff;
  border: 1px solid #ddd;
  border-top: none;
}

th {
  text-align: left;
  padding: 10px 12px;
  font-weight: 500;
  border-bottom: 1px solid #ddd;
  background: #fafaf8;
  color: #555;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

td {
  padding: 10px 12px;
  border-bottom: 1px solid #eee;
  vertical-align: top;
}

tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafaf8; }

.name { font-weight: 500; }
.phone { white-space: nowrap; }
.rating { text-align: center; }
.category { color: #666; font-size: 0.8rem; }

.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 0.75rem;
  font-weight: 500;
}

.tag-no { background: #e8f5e9; color: #2e7d32; }
.tag-yes { background: #e3e3e3; color: #555; }

.empty {
  text-align: center;
  padding: 40px;
  color: #999;
  font-size: 0.9rem;
  background: #fff;
  border: 1px solid #ddd;
  border-top: none;
}

.count {
  font-size: 0.8rem;
  color: #888;
  padding: 12px 0;
}

.download-bar {
  display: none;
  gap: 8px;
  align-items: center;
  padding: 10px 0;
}

.download-bar.visible { display: flex; }

.dl-btn {
  padding: 7px 14px;
  background: #1a1a1a;
  color: #fff;
  border: none;
  border-radius: 5px;
  font-size: 0.82rem;
  cursor: pointer;
}

.dl-btn:hover { background: #333; }

#dl-scope {
  padding: 7px 10px;
  border: 1px solid #ccc;
  border-radius: 5px;
  font-size: 0.82rem;
  background: #fff;
}
</style>
</head>
<body>
<div class="container">
  <h1>Busi Find <span>/ businesses without websites</span></h1>

  <form class="search-form" onsubmit="return doSearch(event)">
    <input type="text" id="location" placeholder="Location (e.g. Ameerpet, Hyderabad)" required>
    <input type="text" id="category" placeholder="Category (e.g. real estate)" required>
    <input type="number" id="limit" value="20" min="1" max="50" title="Max results">
    <button type="submit" id="btn">Search</button>
  </form>

  <div class="progress" id="progress">
    <div class="progress-header">
      <span id="progress-title">Starting...</span>
      <span style="display:flex;align-items:center;gap:10px">
        <span id="timer" style="font-family:'SF Mono','Consolas',monospace;font-size:0.78rem;color:#888">0.0s</span>
        <span class="dot" id="dot"></span>
      </span>
    </div>
    <div class="bar-wrap"><div class="bar" id="bar"></div></div>
    <div class="progress-log" id="log"></div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" onclick="showTab('no')">Without Website <span id="count-no"></span></button>
    <button class="tab" onclick="showTab('yes')">Has Website <span id="count-yes"></span></button>
  </div>

  <div class="download-bar" id="download-bar">
    <button class="dl-btn" onclick="downloadFile('csv')">Download CSV</button>
    <button class="dl-btn" onclick="downloadFile('excel')">Download Excel</button>
    <select id="dl-scope">
      <option value="no">Without Website only</option>
      <option value="yes">Has Website only</option>
      <option value="all">All results</option>
    </select>
  </div>

  <div id="results"></div>
</div>

<script>
let currentData = null;
let currentTab = 'no';
let currentJobId = null;
let logSeen = 0;
let totalTarget = 20;
let timerStart = 0;
let timerInterval = null;

const LABELS = {
  launch: 'init', load: 'load', scroll: 'scroll',
  found: 'found', scrape: 'scan', verify: 'check',
  error: 'err', done: 'done'
};

function doSearch(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Searching...';
  totalTarget = parseInt(document.getElementById('limit').value) || 20;

  document.getElementById('results').innerHTML = '';
  document.getElementById('tabs').classList.remove('visible');
  document.getElementById('log').innerHTML = '';
  document.getElementById('bar').style.width = '0%';
  document.getElementById('progress').classList.add('visible');
  document.getElementById('progress-title').textContent = 'Starting...';
  document.getElementById('dot').classList.remove('idle');
  document.getElementById('timer').textContent = '0.0s';
  document.getElementById('download-bar').classList.remove('visible');
  logSeen = 0;

  // start timer
  timerStart = Date.now();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsed = ((Date.now() - timerStart) / 1000).toFixed(1);
    document.getElementById('timer').textContent = elapsed + 's';
  }, 100);

  fetch('/search', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      location: document.getElementById('location').value,
      category: document.getElementById('category').value,
      limit: document.getElementById('limit').value
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) { finish(); return; }
    currentJobId = data.job_id;
    pollStatus(data.job_id);
  })
  .catch(() => finish());
}

function pollStatus(jobId) {
  fetch('/status/' + jobId + '?since=' + logSeen)
    .then(r => r.json())
    .then(data => {
      document.getElementById('progress-title').textContent = data.detail || data.step || 'Working...';

      // new log entries
      if (data.log && data.log.length > 0) {
        data.log.forEach(entry => {
          // for scroll, update last scroll line instead of adding new
          if (entry.step === 'scroll') {
            updateOrAddLog('scroll', entry.detail);
          } else {
            addLog(entry.step, entry.detail);
          }

          // update progress bar on scrape steps
          if (entry.step === 'scrape') {
            const m = entry.detail.match(/\((\d+)\/(\d+)\)/);
            if (m) {
              const pct = Math.round((parseInt(m[1]) / parseInt(m[2])) * 90);
              document.getElementById('bar').style.width = pct + '%';
            }
          }
          if (entry.step === 'verify') {
            document.getElementById('bar').style.width = '95%';
          }
        });
        logSeen = data.log_total;
      }

      if (data.status === 'done') {
        document.getElementById('bar').style.width = '100%';
        document.getElementById('dot').classList.add('idle');
        addLog('done', 'Complete');
        finish();

        currentData = data.results;
        if (currentData && currentData.total > 0) {
          document.getElementById('count-no').textContent = '(' + currentData.no_website.length + ')';
          document.getElementById('count-yes').textContent = '(' + currentData.has_website.length + ')';
          document.getElementById('tabs').classList.add('visible');
          document.getElementById('download-bar').classList.add('visible');
          document.getElementById('progress-title').textContent =
            currentData.total + ' businesses found — ' + currentData.no_website.length + ' without website';
          showTab('no');
        } else {
          document.getElementById('progress-title').textContent = 'No businesses found';
          document.getElementById('results').innerHTML = '<div class="empty">No results. Try a different location or category.</div>';
        }
      } else {
        setTimeout(() => pollStatus(jobId), 400);
      }
    });
}

function addLog(step, detail) {
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'log-line';
  div.setAttribute('data-step', step);
  div.innerHTML = '<span class="lbl">' + (LABELS[step] || step) + '</span><span class="msg">' + esc(detail) + '</span>';
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function updateOrAddLog(step, detail) {
  const log = document.getElementById('log');
  const existing = log.querySelector('.log-line[data-step="' + step + '"]');
  if (existing) {
    existing.querySelector('.msg').textContent = detail;
  } else {
    addLog(step, detail);
  }
  log.scrollTop = log.scrollHeight;
}

function finish() {
  document.getElementById('btn').disabled = false;
  document.getElementById('btn').textContent = 'Search';
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  // show final time
  const elapsed = ((Date.now() - timerStart) / 1000).toFixed(1);
  document.getElementById('timer').textContent = elapsed + 's';
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'no') || (i === 1 && tab === 'yes'));
  });
  if (!currentData) return;

  const items = tab === 'no' ? currentData.no_website : currentData.has_website;

  if (items.length === 0) {
    document.getElementById('results').innerHTML = '<div class="empty">None found</div>';
    return;
  }

  let html = '<table><thead><tr><th>Name</th><th>Address</th><th>Phone</th><th>Category</th><th>Rating</th><th>Website</th></tr></thead><tbody>';
  items.forEach(b => {
    const rating = b.rating ? (b.rating + '/5') : '-';
    const site = b.website
      ? '<span class="tag tag-yes">' + esc(b.website) + '</span>'
      : '<span class="tag tag-no">No website</span>';
    html += '<tr>'
      + '<td class="name">' + esc(b.name) + '</td>'
      + '<td>' + esc(b.address) + '</td>'
      + '<td class="phone">' + esc(b.phone) + '</td>'
      + '<td class="category">' + esc(b.category) + '</td>'
      + '<td class="rating">' + rating + '</td>'
      + '<td>' + site + '</td>'
      + '</tr>';
  });
  html += '</tbody></table>';
  html += '<div class="count">' + items.length + ' result' + (items.length !== 1 ? 's' : '') + '</div>';
  document.getElementById('results').innerHTML = html;
}

function downloadFile(fmt) {
  if (!currentJobId) return;
  const tab = document.getElementById('dl-scope').value;
  window.location.href = '/download/' + currentJobId + '?format=' + fmt + '&tab=' + tab;
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
